<button onclick="sendSubmission()" class="bg-green-600 text-white px-6 py-2 rounded">
Submit for AI Review
</button>

<script>

async function sendSubmission(){

let task = "Build a startup landing page";
let submission = document.querySelector("textarea").value;

let response = await fetch("http://127.0.0.1:5000/review", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
task: task,
submission: submission
})
});

let data = await response.json();

alert(
"Requirement Match: " + data.requirement_match +
"\nQuality Score: " + data.quality_score +
"\nOriginality: " + data.originality +
"\nDecision: " + data.decision
);

}

</script>
