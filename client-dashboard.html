<!DOCTYPE html>
<html>
<head>
<title>Client Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-black text-white p-4 flex justify-between">

<h1 class="font-bold text-xl">AI Escrow Platform</h1>

<p>Client Dashboard</p>

</nav>

<div class="p-8">

<h2 class="text-2xl font-bold mb-6">Create New Task</h2>

<div class="bg-white p-6 rounded shadow w-1/2">

<input
type="text"
placeholder="Project Title"
class="w-full border p-2 rounded mb-3">

<textarea
placeholder="Describe the project requirement"
class="w-full border p-2 rounded mb-3"
rows="4"></textarea>

<input
type="number"
placeholder="Budget ($)"
class="w-full border p-2 rounded mb-4">

<button class="bg-blue-600 text-white px-6 py-2 rounded">
Create Task
</button>

</div>

</div>

</body>
</html>
