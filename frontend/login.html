<!DOCTYPE html>
<html>
<head>
<title>Login - AI Escrow Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-xl rounded-lg p-8 w-96">

<h2 class="text-2xl font-bold text-center mb-6">
AI Freelance Verification
</h2>

<input type="email"
placeholder="Email"
class="w-full border p-2 rounded mb-4">

<input type="password"
placeholder="Password"
class="w-full border p-2 rounded mb-4">

<select class="w-full border p-2 rounded mb-4">

<option>Login as Client</option>
<option>Login as Freelancer</option>

</select>

<button class="bg-blue-600 text-white w-full py-2 rounded">
Login
</button>

</div>

</body>
</html>
