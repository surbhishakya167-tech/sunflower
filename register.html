<!DOCTYPE html>
<html>
<head>
<title>Register - AI Escrow Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-xl rounded-lg p-8 w-96">

<h2 class="text-2xl font-bold text-center mb-6">
Create Account
</h2>

<input type="text"
placeholder="Full Name"
class="w-full border p-2 rounded mb-3">

<input type="email"
placeholder="Email"
class="w-full border p-2 rounded mb-3">

<input type="password"
placeholder="Password"
class="w-full border p-2 rounded mb-3">

<select class="w-full border p-2 rounded mb-4">

<option>Register as Client</option>
<option>Register as Freelancer</option>

</select>

<button class="bg-green-600 text-white w-full py-2 rounded hover:bg-green-700">
Register
</button>

<p class="text-center mt-4 text-sm">
Already have an account?
<a href="login.html" class="text-blue-600">Login</a>
</p>

</div>

</body>
</html>
